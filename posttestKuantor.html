<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Logika Cerita — Kuantor & Kesimpulan</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Josefin+Sans:wght@300;400;600&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════
   RESET & ROOT
══════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:       #0e0c0a;
  --surface:  #16130f;
  --card:     #1e1a15;
  --border:   #2e2820;
  --accent:   #c9973a;
  --accent2:  #7eb8a4;
  --text:     #e8dfc8;
  --muted:    #7a6f5e;
  --correct:  #5aad7a;
  --wrong:    #c95a5a;
  --glow:     rgba(201,151,58,0.18);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 18px;
  line-height: 1.75;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: default;
}

/* ── starfield bg ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(201,151,58,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(126,184,164,0.04) 0%, transparent 60%);
  pointer-events: none;
}

/* ── noise grain ── */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

.wrap {
  max-width: 880px;
  margin: 0 auto;
  padding: 60px 28px 100px;
  position: relative; z-index: 1;
}

/* ══════════════════════════════════
   HEADER
══════════════════════════════════ */
.header-grid {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 20px;
  margin-bottom: 20px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.header-left .eyebrow {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-left .eyebrow::before {
  content: '';
  width: 32px; height: 1px;
  background: var(--accent);
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.2rem, 5.5vw, 3.8rem);
  font-weight: 700;
  line-height: 1.1;
  color: var(--text);
  letter-spacing: -0.01em;
}

h1 .gold { color: var(--accent); font-style: italic; }

.header-meta {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-top: 12px;
}

.score-counter {
  text-align: right;
}

.score-counter .live-score {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3rem;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}

.score-counter .live-label {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
}

/* ── progress ── */
.progress-section {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 48px;
}

.prog-track {
  flex: 1;
  height: 3px;
  background: var(--border);
  position: relative;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  transition: width 0.6s cubic-bezier(.4,0,.2,1);
  width: 0%;
  position: relative;
}

.prog-fill::after {
  content: '';
  position: absolute;
  right: -2px; top: -2px;
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--accent);
  display: none;
}

.prog-fill.active::after { display: block; }

.prog-num {
  font-family: 'Inconsolata', monospace;
  font-size: 13px;
  color: var(--muted);
  min-width: 44px;
  text-align: right;
}

/* ══════════════════════════════════
   QUESTION CARD
══════════════════════════════════ */
.q-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-top: 2px solid var(--accent);
  padding: 36px 36px 28px;
  margin-bottom: 20px;
  position: relative;
  animation: rise 0.45s cubic-bezier(.2,.8,.4,1) both;
  transition: border-color 0.3s;
}

.q-card:hover { border-color: rgba(201,151,58,0.3); }

@keyframes rise {
  from { opacity:0; transform: translateY(16px); }
  to   { opacity:1; transform: translateY(0); }
}

.q-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.q-num {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
  border: 1px solid rgba(201,151,58,0.3);
  padding: 3px 10px;
}

.q-tag {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent2);
  border: 1px solid rgba(126,184,164,0.3);
  padding: 3px 10px;
}

/* Story block */
.story-block {
  background: rgba(255,255,255,0.025);
  border-left: 3px solid var(--accent);
  padding: 18px 22px;
  margin-bottom: 22px;
  font-style: italic;
  font-size: 17px;
  color: #c8bfa0;
  line-height: 1.8;
  position: relative;
}

.story-block::before {
  content: '"';
  position: absolute;
  top: -8px; left: 14px;
  font-size: 3rem;
  color: var(--accent);
  opacity: 0.25;
  font-family: Georgia, serif;
  line-height: 1;
}

.story-block .premise {
  font-family: 'Inconsolata', monospace;
  font-style: normal;
  font-size: 14px;
  background: rgba(201,151,58,0.08);
  border: 1px solid rgba(201,151,58,0.15);
  padding: 3px 8px;
  border-radius: 2px;
  color: var(--accent);
  display: inline-block;
  margin: 2px 0;
}

.q-stem {
  font-size: 17.5px;
  color: var(--text);
  margin-bottom: 22px;
  line-height: 1.7;
}

.q-stem strong { color: var(--accent); font-weight: 600; }

/* ── Options ── */
.opts { display: flex; flex-direction: column; gap: 10px; }

.opt-lbl {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  cursor: pointer;
  padding: 14px 18px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.opt-lbl::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  transform: scaleY(0);
  transition: transform 0.2s;
}

.opt-lbl:hover {
  border-color: rgba(201,151,58,0.4);
  background: rgba(201,151,58,0.04);
}

.opt-lbl:hover::before { transform: scaleY(1); }

.opt-lbl input[type="radio"] { display: none; }

.opt-circle {
  width: 20px; height: 20px;
  border: 1.5px solid var(--muted);
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 3px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}

.opt-lbl input:checked ~ .opt-circle {
  border-color: var(--accent);
  background: var(--accent);
  box-shadow: 0 0 10px rgba(201,151,58,0.4);
}

.opt-lbl input:checked ~ .opt-circle::after {
  content: '';
  width: 7px; height: 7px;
  background: var(--bg);
  border-radius: 50%;
}

.opt-letter {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--muted);
  min-width: 16px;
  margin-top: 4px;
  font-weight: 600;
}

.opt-text {
  font-size: 16px;
  line-height: 1.65;
  color: var(--text);
  flex: 1;
}

/* Feedback */
.opt-lbl.correct {
  border-color: var(--correct);
  background: rgba(90,173,122,0.07);
}

.opt-lbl.correct::before { background: var(--correct); transform: scaleY(1); }
.opt-lbl.correct .opt-circle { border-color: var(--correct); background: var(--correct); box-shadow: 0 0 10px rgba(90,173,122,0.4); }

.opt-lbl.wrong {
  border-color: var(--wrong);
  background: rgba(201,90,90,0.07);
}

.opt-lbl.wrong::before { background: var(--wrong); transform: scaleY(1); }
.opt-lbl.wrong .opt-circle { border-color: var(--wrong); background: var(--wrong); }

.fb-chip {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.15em;
  padding: 3px 9px;
  border-radius: 1px;
  align-self: center;
  flex-shrink: 0;
}

.chip-ok  { background: var(--correct); color: #0a1f12; }
.chip-no  { background: var(--wrong);   color: #200a0a; }

/* ── Explanation ── */
.explanation {
  display: none;
  margin-top: 20px;
  padding: 18px 22px;
  background: rgba(126,184,164,0.05);
  border: 1px solid rgba(126,184,164,0.2);
  border-left: 3px solid var(--accent2);
  font-size: 15.5px;
  color: #a8c4bc;
  line-height: 1.75;
  animation: fadeUp 0.35s ease;
}

.explanation.show { display: block; }

@keyframes fadeUp {
  from { opacity:0; transform: translateY(6px); }
  to   { opacity:1; transform: translateY(0); }
}

.exp-label {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent2);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}

.exp-label::after {
  content: '';
  flex: 1; height: 1px;
  background: rgba(126,184,164,0.2);
}

.formula-inline {
  font-family: 'Inconsolata', monospace;
  font-size: 14px;
  background: rgba(201,151,58,0.1);
  color: var(--accent);
  padding: 1px 7px;
  border-radius: 2px;
}

/* ── Separator ── */
.sep {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 12px 0 20px;
  color: var(--border);
  font-size: 12px;
}

.sep::before, .sep::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ══════════════════════════════════
   BOTTOM ACTIONS
══════════════════════════════════ */
.action-bar {
  display: flex;
  gap: 14px;
  margin-top: 44px;
  flex-wrap: wrap;
  align-items: center;
}

.btn {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 14px 36px;
  border: 1.5px solid;
  cursor: pointer;
  transition: all 0.22s;
  background: transparent;
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: currentColor;
  opacity: 0;
  transition: opacity 0.2s;
}

.btn:hover::before { opacity: 0.08; }

.btn-primary {
  border-color: var(--accent);
  color: var(--accent);
}

.btn-primary:hover {
  background: var(--accent);
  color: var(--bg);
}

.btn-ghost {
  border-color: var(--border);
  color: var(--muted);
}

.btn-ghost:hover {
  border-color: var(--muted);
  color: var(--text);
}

.btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ══════════════════════════════════
   RESULT PANEL
══════════════════════════════════ */
#result-panel {
  display: none;
  margin-top: 40px;
  background: var(--card);
  border: 1px solid var(--border);
  border-top: 3px solid var(--accent);
  padding: 48px 40px;
  animation: rise 0.5s ease;
  text-align: center;
}

.result-eyebrow {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.4em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.result-score {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(4rem, 12vw, 7rem);
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  text-shadow: 0 0 40px rgba(201,151,58,0.3);
}

.result-pct {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 13px;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin: 10px 0 24px;
}

.grade-box {
  display: inline-block;
  border: 1.5px solid var(--accent);
  padding: 10px 28px;
  font-family: 'Josefin Sans', sans-serif;
  font-size: 12px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 32px;
}

.result-breakdown {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  margin: 0 0 32px;
  text-align: center;
}

.rb-cell {
  background: var(--surface);
  padding: 18px 12px;
}

.rb-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}

.rb-num.green { color: var(--correct); }
.rb-num.red   { color: var(--wrong); }
.rb-num.gold  { color: var(--accent); }

.rb-lbl {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
}

/* ── form status ── */
#form-status {
  font-family: 'Inconsolata', monospace;
  font-size: 13px;
  padding: 14px 20px;
  letter-spacing: 0.05em;
  display: none;
  margin-top: 16px;
  text-align: left;
}

#form-status.loading { display:block; color: var(--accent);  border:1px solid rgba(201,151,58,0.3); }
#form-status.ok      { display:block; color: var(--correct); border:1px solid rgba(90,173,122,0.3); }
#form-status.fail    { display:block; color: var(--wrong);   border:1px solid rgba(201,90,90,0.3); }

/* ── name modal ── */
#name-modal {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
}

#name-modal.open { display: flex; }

.modal-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-top: 3px solid var(--accent);
  padding: 40px 44px;
  width: 90%;
  max-width: 440px;
  animation: rise 0.3s ease;
}

.modal-box h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.modal-box p {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 24px;
}

.modal-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  padding: 12px 16px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 20px;
}

.modal-input:focus { border-color: var(--accent); }

.modal-actions { display: flex; gap: 12px; }

/* ── tooltip hover on q-card ── */
.q-card.answered { border-top-color: var(--accent2); }
.q-card.answered-wrong { border-top-color: var(--wrong); }

@media (max-width: 640px) {
  .header-grid { grid-template-columns: 1fr; }
  .score-counter { text-align: left; }
  .result-breakdown { grid-template-columns: repeat(3,1fr); }
  .q-card { padding: 22px 18px; }
  .story-block { padding: 14px 16px; }
  .modal-box { padding: 28px 22px; }
}
</style>
</head>
<body>

<!-- NAME MODAL -->
<div id="name-modal">
  <div class="modal-box">
    <h2>Identitas Peserta</h2>
    <p>Masukkan nama Anda sebelum hasil dikirim ke Google Form.</p>
    <input id="name-input" class="modal-input" type="text" placeholder="Nama lengkap…" maxlength="80" />
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="confirmName()">Kirim Hasil</button>
      <button class="btn btn-ghost" onclick="closeModal()">Anonim</button>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- HEADER -->
  <div class="header-grid">
    <div class="header-left">
      <div class="eyebrow">Logika Matematika · Soal Cerita Kompleks</div>
      <h1>Kuantor &amp;<br><span class="gold">Logika Kesimpulan</span></h1>
      <div class="header-meta">10 Soal Cerita Analisis · Tingkat Menengah-Lanjut</div>
    </div>
    <div class="score-counter">
      <div class="live-score" id="live-score">—</div>
      <div class="live-label">Skor Live</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-section">
    <div class="prog-track">
      <div class="prog-fill" id="prog-fill"></div>
    </div>
    <div class="prog-num" id="prog-num">0 / 10</div>
  </div>

  <!-- QUIZ BODY -->
  <div id="quiz-body"></div>

  <!-- ACTIONS -->
  <div class="action-bar">
    <button class="btn btn-primary" id="btn-submit" onclick="onSubmit()">Selesai &amp; Kirim →</button>
    <button class="btn btn-ghost"   id="btn-reset"  onclick="resetAll()">↺ Ulangi Kuis</button>
  </div>

  <!-- RESULT -->
  <div id="result-panel">
    <div class="result-eyebrow">Hasil Evaluasi</div>
    <div class="result-score" id="r-score">0/10</div>
    <div class="result-pct"   id="r-pct">Persentase: 0%</div>
    <div class="grade-box"    id="r-grade">—</div>

    <div class="result-breakdown">
      <div class="rb-cell">
        <div class="rb-num green" id="r-correct">0</div>
        <div class="rb-lbl">Benar</div>
      </div>
      <div class="rb-cell">
        <div class="rb-num red" id="r-wrong">0</div>
        <div class="rb-lbl">Salah</div>
      </div>
      <div class="rb-cell">
        <div class="rb-num gold" id="r-pct2">0%</div>
        <div class="rb-lbl">Akurasi</div>
      </div>
    </div>

    <div id="form-status"></div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════════════════
   SOAL CERITA KOMPLEKS
══════════════════════════════════════════════════════ */
const SOAL = [
  {
    tag: "Kuantor Universal + Silogisme",
    story: `Di sebuah perusahaan teknologi, <span class="premise">setiap karyawan yang lulus sertifikasi keamanan siber pasti mendapat akses ke server produksi</span>. Departemen audit menemukan bahwa <span class="premise">Rafi adalah karyawan yang lulus sertifikasi tersebut</span>. Namun manajer IT kemudian melaporkan bahwa <span class="premise">Rafi ternyata tidak mendapat akses ke server produksi</span>.`,
    stem: `Berdasarkan ketiga pernyataan di atas, apa yang dapat disimpulkan secara logis tentang kondisi sistem di perusahaan tersebut?`,
    options: [
      "Sistem berjalan normal karena ada kemungkinan pengecualian dalam kebijakan",
      "Terdapat kontradiksi — salah satu dari tiga pernyataan tersebut pasti tidak benar",
      "Rafi sebenarnya belum benar-benar lulus sertifikasi, hanya dianggap lulus",
      "Manajer IT yang salah mencatat, sehingga data audit lebih dipercaya"
    ],
    answer: 1,
    exp: `Tiga pernyataan membentuk: (1) <span class="formula-inline">∀x, Lulus(x) → AksesServer(x)</span>, (2) <span class="formula-inline">Lulus(Rafi)</span>, (3) <span class="formula-inline">¬AksesServer(Rafi)</span>. Dengan Modus Ponens dari (1) dan (2) harusnya <span class="formula-inline">AksesServer(Rafi)</span> benar, tapi (3) mengklaim sebaliknya. Ini adalah <strong>kontradiksi logis</strong> — sistem pernyataannya tidak konsisten dan salah satu pasti keliru.`
  },
  {
    tag: "Kuantor Eksistensial + Negasi",
    story: `Seorang peneliti mengklaim: <span class="premise">"Tidak ada mahasiswa di angkatan ini yang mengulang semua mata kuliah."</span> Ketua program studi merespons: <span class="premise">"Setidaknya ada satu mahasiswa yang mengulang seluruh mata kuliah semester lalu."</span>`,
    stem: `Manakah representasi logika formal yang paling tepat untuk pernyataan sang peneliti, beserta negasinya yang disebut oleh ketua prodi?`,
    options: [
      "Peneliti: ∀x, ¬UlangSemua(x) — Negasinya: ∃x, UlangSemua(x)",

/* ══════════════════════════════════════════════════════
   GOOGLE FORM CONFIG — Ganti dengan ID Form Anda
══════════════════════════════════════════════════════ */
const FORM = {
  url: "https://docs.google.com/forms/u/0/d/e/1FAIpQLScpMMeLV9_n00dbcr_GOa0wSHeMoM36lSz3xy5Sdpp8UAb01A/formResponse",
  fields: {
    nama:    "entry.1209405564",
    skor:    "entry.1569864443",
    persen:  "entry.839134846",
    grade:   "entry.1599566330",
    detail:  "entry.2076062853"
  }
};

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
let pilihan   = new Array(SOAL.length).fill(null);
let submitted = false;
let namaUser  = '';
let pendingScore = null;

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
function render() {
  const body = document.getElementById('quiz-body');
  body.innerHTML = '';

  SOAL.forEach((s, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `card-${qi}`;
    card.style.animationDelay = `${qi * 0.04}s`;

    const letters = ['A','B','C','D'];
    const optsHtml = s.options.map((o, oi) => `
      <label class="opt-lbl" id="opt-${qi}-${oi}">
        <input type="radio" name="q${qi}" value="${oi}" onchange="pick(${qi},${oi})">
        <span class="opt-circle"></span>
        <span class="opt-letter">${letters[oi]}</span>
        <span class="opt-text">${o}</span>
      </label>
    `).join('');

    card.innerHTML = `
      <div class="q-meta">
        <span class="q-num">Soal ${qi+1}</span>
        <span class="q-tag">${s.tag}</span>
      </div>
      <div class="story-block">${s.story}</div>
      <div class="q-stem">${s.stem}</div>
      <div class="opts">${optsHtml}</div>
      <div class="explanation" id="exp-${qi}">
        <div class="exp-label">Pembahasan</div>
        ${s.exp}
      </div>
    `;

    body.appendChild(card);

    if (qi < SOAL.length - 1) {
      const sep = document.createElement('div');
      sep.className = 'sep';
      sep.innerHTML = '◆';
      body.appendChild(sep);
    }
  });

  updateProgress();
}

/* ══════════════════════════════════════════════════════
   INTERAKSI
══════════════════════════════════════════════════════ */
function pick(qi, oi) {
  if (submitted) return;
  pilihan[qi] = oi;
  updateProgress();

  // Highlight card
  const card = document.getElementById(`card-${qi}`);
  card.classList.add('answered');
}

function updateProgress() {
  const done = pilihan.filter(p => p !== null).length;
  const pct  = (done / SOAL.length) * 100;
  const fill = document.getElementById('prog-fill');
  fill.style.width = pct + '%';
  fill.classList.toggle('active', pct > 0);
  document.getElementById('prog-num').textContent = `${done} / ${SOAL.length}`;

  if (submitted) {
    const correct = pilihan.filter((p,i) => p === SOAL[i].answer).length;
    document.getElementById('live-score').textContent = `${correct}/10`;
  } else {
    document.getElementById('live-score').textContent = done > 0 ? `${done}✓` : '—';
  }
}

/* ══════════════════════════════════════════════════════
   SUBMIT FLOW
══════════════════════════════════════════════════════ */
function onSubmit() {
  const unanswered = pilihan.filter(p => p === null).length;
  if (unanswered > 0) {
    alert(`Masih ada ${unanswered} soal yang belum dijawab.\nSelesaikan semua soal terlebih dahulu!`);
    // Scroll ke soal pertama yang belum dijawab
    const firstUnanswered = pilihan.findIndex(p => p === null);
    document.getElementById(`card-${firstUnanswered}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  // Hitung skor dulu
  let correct = 0;
  SOAL.forEach((s,i) => { if (pilihan[i] === s.answer) correct++; });
  pendingScore = correct;

  // Buka modal nama
  document.getElementById('name-modal').classList.add('open');
  document.getElementById('name-input').focus();
}

function confirmName() {
  namaUser = document.getElementById('name-input').value.trim() || 'Anonim';
  closeModal();
  finalize();
}

function closeModal() {
  document.getElementById('name-modal').classList.remove('open');
  if (!namaUser) namaUser = 'Anonim';
  if (pendingScore !== null) finalize();
}

// Enter key in modal
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmName();
  });
});

function finalize() {
  submitted = true;
  document.getElementById('btn-submit').disabled = true;

  const correct = pendingScore;
  const pct     = Math.round((correct / SOAL.length) * 100);
  const grade   = pct >= 90 ? 'A — Sangat Istimewa' :
                  pct >= 80 ? 'B — Baik Sekali'      :
                  pct >= 70 ? 'C — Baik'              :
                  pct >= 55 ? 'D — Cukup'             : 'E — Perlu Remedial';

  const detailArr = [];

  // Terapkan feedback visual
  SOAL.forEach((s, qi) => {
    const chosen = pilihan[qi];
    const right  = chosen === s.answer;
    if (right) detailArr.push(`S${qi+1}:BENAR`);
    else       detailArr.push(`S${qi+1}:SALAH(pilih:${s.options[chosen].substring(0,20)}…)`);

    s.options.forEach((_, oi) => {
      const lbl = document.getElementById(`opt-${qi}-${oi}`);
      lbl.style.pointerEvents = 'none';

      if (oi === s.answer) {
        lbl.classList.add('correct');
        if (oi === chosen) {
          const chip = document.createElement('span');
          chip.className = 'fb-chip chip-ok';
          chip.textContent = 'BENAR';
          lbl.appendChild(chip);
        }
      } else if (oi === chosen) {
        lbl.classList.add('wrong');
        const chip = document.createElement('span');
        chip.className = 'fb-chip chip-no';
        chip.textContent = 'SALAH';
        lbl.appendChild(chip);

        // Update card border
        document.getElementById(`card-${qi}`).classList.add('answered-wrong');
      }
    });

    document.getElementById(`exp-${qi}`).classList.add('show');
  });

  // Tampilkan result panel
  const panel = document.getElementById('result-panel');
  panel.style.display = 'block';
  document.getElementById('r-score').textContent   = `${correct}/10`;
  document.getElementById('r-pct').textContent     = `Persentase Benar: ${pct}%`;
  document.getElementById('r-grade').textContent   = grade;
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent   = 10 - correct;
  document.getElementById('r-pct2').textContent    = `${pct}%`;

  updateProgress();

  setTimeout(() => {
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 300);

  // Kirim ke Google Form
  kirimForm(correct, pct, grade, detailArr.join(' | '));
}

/* ══════════════════════════════════════════════════════
   KIRIM KE GOOGLE FORM
══════════════════════════════════════════════════════ */
function kirimForm(skor, persen, grade, detail) {
  const status = document.getElementById('form-status');
  status.className = 'loading';
  status.innerHTML = '⟳ Mengirimkan hasil ke Google Form…';

  const body = new URLSearchParams();
  body.append(FORM.fields.nama,   namaUser);
  body.append(FORM.fields.skor,   `${skor}/10`);
  body.append(FORM.fields.persen, `${persen}%`);
  body.append(FORM.fields.grade,  grade);
  body.append(FORM.fields.detail, detail);

  fetch(FORM.url, {
    method : 'POST',
    mode   : 'no-cors',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body   : body.toString()
  })
  .then(() => {
    status.className = 'ok';
    status.innerHTML = `✔ Berhasil dikirim ke Google Form &nbsp;·&nbsp; Nama: <strong>${namaUser}</strong> &nbsp;·&nbsp; Skor: <strong>${skor}/10 (${persen}%)</strong>`;
  })
  .catch(err => {
    status.className = 'fail';
    status.innerHTML = `✘ Pengiriman gagal (${err.message}). Skor Anda: ${skor}/10 (${persen}%). Silakan hubungi pengajar.`;
  });
}

/* ══════════════════════════════════════════════════════
   RESET
══════════════════════════════════════════════════════ */
function resetAll() {
  if (submitted && !confirm('Yakin ingin mengulang kuis dari awal?')) return;
  pilihan   = new Array(SOAL.length).fill(null);
  submitted = false;
  namaUser  = '';
  pendingScore = null;
  document.getElementById('btn-submit').disabled = false;
  document.getElementById('result-panel').style.display = 'none';
  document.getElementById('form-status').className = '';
  document.getElementById('live-score').textContent = '—';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
render();
</script>
